<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>刚体转动欧拉角 | 角度精确同步 | 稳定无频闪</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-left: 4px solid #ff8c00;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        #info h1 {
            margin: 0 0 5px;
            font-size: 1.1rem;
        }
        #info p {
            margin: 0;
            font-size: 0.75rem;
            opacity: 0.8;
        }
        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(30,30,40,0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 15px 20px;
            color: white;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 15px;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            font-weight: 500;
        }
        .slider-container {
            flex: 1;
            min-width: 150px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 8px 12px;
            text-align: center;
        }
        .slider-container label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .slider-container label span {
            color: #ffaa44;
            font-weight: bold;
        }
        input {
            width: 100%;
            cursor: pointer;
            accent-color: #ff8c00;
        }
        .value-display {
            font-size: 0.8rem;
            margin-top: 5px;
            font-family: monospace;
            background: #00000066;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .note {
            font-size: 0.7rem;
            text-align: center;
            opacity: 0.85;
            width: 100%;
            margin-top: 5px;
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 4px;
        }
        @media (max-width: 700px) {
            .controls-panel { flex-direction: column; gap: 8px; bottom: 10px; left: 10px; right: 10px; padding: 12px; }
            .slider-container { width: 100%; }
            #info { top: 10px; left: 10px; font-size: 10px; padding: 8px 12px; }
        }
        button {
            position: absolute;
            bottom: 90px;
            right: 20px;
            z-index: 100;
            padding: 8px 16px;
            background-color: #2c3e66;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(4px);
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        button:hover {
            background-color: #1e2a4a;
            transform: scale(1.02);
        }
        .status-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-family: monospace;
            color: #ccc;
            pointer-events: none;
            z-index: 100;
        }
        .plane-legend {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0,0,0,0.55);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 11px;
            color: #ddd;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
            border-right: 3px solid #ffaa66;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>📐 刚体转动欧拉角 | 角度精确同步 | 稳定无频闪</h1>
        <p>空间：ξ(红·X轴) η(绿·Y轴) ζ(蓝·Z轴↑竖直向上) | 本体：x(红) y(绿) z(蓝) 初始完全重合</p>
    </div>
    <div class="controls-panel">
        <div class="slider-container">
            <label>🎡 进动角 <span style="color:#ffaa66;">φ</span> (绕ζ轴)</label>
            <input type="range" id="phi" min="0" max="360" step="1" value="60">
            <div><span class="value-display" id="phiVal">60°</span></div>
        </div>
        <div class="slider-container">
            <label>📐 章动角 <span style="color:#66ffaa;">θ</span> (ξη面 ↔ xy面夹角)</label>
            <input type="range" id="theta" min="0" max="180" step="1" value="55">
            <div><span class="value-display" id="thetaVal">55°</span></div>
        </div>
        <div class="slider-container">
            <label>🌀 自转角 <span style="color:#aa66ff;">ψ</span> (节线 → 本体x轴)</label>
            <input type="range" id="psi" min="0" max="360" step="1" value="30">
            <div><span class="value-display" id="psiVal">30°</span></div>
        </div>
        <div class="note">
            💡 ZXZ欧拉角: 绕ζ轴(竖直)转φ → 绕节线(新X₁)转θ → 绕本体z轴转ψ<br>
            🟣 固定水平面=ξη平面 | 🟠 随动平面=xy平面 | 白色虚线=节线(两平面交线)<br>
            🔵 <strong>滑块的数值 = 图像实际转动的角度，完全同步</strong>
        </div>
    </div>
    <button id="resetViewBtn">⟳ 重置相机视角</button>
    <div class="status-badge">✨ 角度精确同步 | 滑块数值 = 实际转动角度 | 无频闪</div>
    <div class="plane-legend">
        🟣 空间ξη平面(固定水平)<br>
        🟠 本体xy平面(随动)<br>
        ⚪ 白色虚线=节线(交线)<br>
        🔵 ζ轴 竖直向上
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ========== 初始化场景 ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);

        // 相机位置：从斜侧方观察，清晰看到竖直向上的ζ轴和水平面
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.5, 4.5, 5.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 0, 0);
        
        // ========== 空间坐标系 (固定) ==========
        // 定义: ξ轴 -> X轴(红色), η轴 -> Y轴(绿色), ζ轴 -> Z轴(蓝色，竖直向上)
        const axisLen = 2.0;
        const xiArrow = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 0), axisLen, 0xff6666, 0.22, 0.1);
        const etaArrow = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 0), axisLen, 0x66ff66, 0.22, 0.1);
        const zetaArrow = new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, 0), axisLen, 0x66aaff, 0.22, 0.1);
        scene.add(xiArrow, etaArrow, zetaArrow);
        
        // 加粗 ζ 轴 (竖直向上，高亮显示)
        const zetaLinePoints = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, 2.2)];
        const zetaLineGeo = new THREE.BufferGeometry().setFromPoints(zetaLinePoints);
        const zetaLineMat = new THREE.LineBasicMaterial({ color: 0x3399ff });
        const zetaHighlight = new THREE.Line(zetaLineGeo, zetaLineMat);
        scene.add(zetaHighlight);
        
        // 添加一个从原点向上的箭头指示器
        const verticalArrow = new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, 0), 2.3, 0x44aaff, 0.3, 0.15);
        scene.add(verticalArrow);
        
        function makeFixedLabel(text, color, pos) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '20px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 0px black';
            div.style.background = 'rgba(20,20,40,0.7)';
            div.style.padding = '2px 8px';
            div.style.borderRadius = '16px';
            div.style.border = `1px solid ${color}`;
            const label = new CSS2DObject(div);
            label.position.copy(pos);
            return label;
        }
        scene.add(makeFixedLabel('ξ', '#ff8888', new THREE.Vector3(2.25, 0.1, 0)));
        scene.add(makeFixedLabel('η', '#88ff88', new THREE.Vector3(0, 2.25, 0.1)));
        scene.add(makeFixedLabel('ζ', '#88aaff', new THREE.Vector3(0, 0.1, 2.25)));
        
        // ========== 空间 ξη 平面 (固定水平面，位于 Z=0) ==========
        const planeSize = 3.8;
        const spacePlaneGeo = new THREE.PlaneGeometry(planeSize, planeSize);
        const spacePlaneMat = new THREE.MeshPhongMaterial({ 
            color: 0x8866ff, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.35, 
            emissive: 0x221166,
            shininess: 60
        });
        const spacePlane = new THREE.Mesh(spacePlaneGeo, spacePlaneMat);
        spacePlane.position.set(0, 0, 0);
        scene.add(spacePlane);
        
        const spaceEdges = new THREE.EdgesGeometry(spacePlaneGeo);
        const spaceWire = new THREE.LineSegments(spaceEdges, new THREE.LineBasicMaterial({ color: 0xaa88ff, transparent: true, opacity: 0.5 }));
        spaceWire.position.copy(spacePlane.position);
        scene.add(spaceWire);
        
        // 水平圆环装饰
        const ring = new THREE.Mesh(new THREE.TorusGeometry(2.2, 0.03, 64, 128), new THREE.MeshStandardMaterial({ color: 0x88aaff, transparent: true, opacity: 0.25 }));
        ring.rotation.x = Math.PI / 2;
        ring.position.z = 0.01;
        scene.add(ring);
        
        const originSphere = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x331100 }));
        scene.add(originSphere);
        
        // ========== 本体坐标系 (可旋转) ==========
        const bodyGroup = new THREE.Group();
        
        const bodyX = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 0), 1.8, 0xff5555, 0.32, 0.14);
        const bodyY = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 0), 1.8, 0x55ff55, 0.32, 0.14);
        const bodyZ = new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, 0), 1.8, 0x55aaff, 0.32, 0.14);
        bodyGroup.add(bodyX, bodyY, bodyZ);
        
        const xDiv = document.createElement('div');
        xDiv.textContent = 'x'; xDiv.style.cssText = 'color:#ff8888;font-size:20px;font-weight:bold;background:rgba(0,0,0,0.7);padding:0px 8px;border-radius:12px;border:1px solid #ff6666';
        const yDiv = document.createElement('div');
        yDiv.textContent = 'y'; yDiv.style.cssText = 'color:#88ff88;font-size:20px;font-weight:bold;background:rgba(0,0,0,0.7);padding:0px 8px;border-radius:12px;border:1px solid #66ff66';
        const zDiv = document.createElement('div');
        zDiv.textContent = 'z'; zDiv.style.cssText = 'color:#aaccff;font-size:20px;font-weight:bold;background:rgba(0,0,0,0.7);padding:0px 8px;border-radius:12px;border:1px solid #66aaff';
        const xLabel = new CSS2DObject(xDiv); xLabel.position.set(2.12, 0.12, 0.12);
        const yLabel = new CSS2DObject(yDiv); yLabel.position.set(0.12, 2.12, 0.12);
        const zLabel = new CSS2DObject(zDiv); zLabel.position.set(0.12, 0.12, 2.12);
        bodyGroup.add(xLabel, yLabel, zLabel);
        
        const cube = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.9, 0.9), new THREE.MeshPhongMaterial({ color: 0x5a9eff, transparent: true, opacity: 0.2 }));
        const wireCube = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.9, 0.9), new THREE.MeshBasicMaterial({ color: 0x8abfff, wireframe: true, transparent: true, opacity: 0.4 }));
        bodyGroup.add(cube, wireCube);
        
        const tipMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x442200 });
        const tipX = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 10), tipMat); tipX.position.set(1.8, 0, 0);
        const tipY = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 10), tipMat); tipY.position.set(0, 1.8, 0);
        const tipZ = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 10), tipMat); tipZ.position.set(0, 0, 1.8);
        bodyGroup.add(tipX, tipY, tipZ);
        
        scene.add(bodyGroup);
        
        // ========== 本体 xy 平面 ==========
        const bodyPlaneGeo = new THREE.PlaneGeometry(planeSize, planeSize);
        const bodyPlaneMat = new THREE.MeshPhongMaterial({ 
            color: 0xff8844, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.4, 
            emissive: 0x441100,
            shininess: 60
        });
        const bodyPlane = new THREE.Mesh(bodyPlaneGeo, bodyPlaneMat);
        bodyGroup.add(bodyPlane);
        
        const bodyEdges = new THREE.EdgesGeometry(bodyPlaneGeo);
        const bodyWire = new THREE.LineSegments(bodyEdges, new THREE.LineBasicMaterial({ color: 0xffaa66, transparent: true, opacity: 0.6 }));
        bodyPlane.add(bodyWire);
        
        // ========== 节线 (两平面交线) 可视化 ==========
        let nodalLine = null;
        
        // ========== 实时角度标注 (CSS2D) ==========
        const phiDiv = document.createElement('div');
        phiDiv.style.cssText = 'color:#ffaa66;font-size:16px;font-weight:bold;background:rgba(0,0,0,0.7);padding:3px 10px;border-radius:20px;border:2px solid #ffaa66;white-space:nowrap';
        phiDiv.textContent = 'φ = 60°';
        const phiLabel = new CSS2DObject(phiDiv);
        scene.add(phiLabel);
        let precessionArc = null;
        
        const thetaDiv = document.createElement('div');
        thetaDiv.style.cssText = 'color:#66ffaa;font-size:16px;font-weight:bold;background:rgba(0,0,0,0.7);padding:3px 10px;border-radius:20px;border:2px solid #66ffaa;white-space:nowrap';
        thetaDiv.textContent = 'θ = 55°';
        const thetaLabel = new CSS2DObject(thetaDiv);
        scene.add(thetaLabel);
        let nutationArc = null;
        
        const psiDiv = document.createElement('div');
        psiDiv.style.cssText = 'color:#aa66ff;font-size:16px;font-weight:bold;background:rgba(0,0,0,0.7);padding:3px 10px;border-radius:20px;border:2px solid #aa66ff;white-space:nowrap';
        psiDiv.textContent = 'ψ = 30°';
        const psiLabel = new CSS2DObject(psiDiv);
        scene.add(psiLabel);
        let spinArc = null;
        
        // 更新进动角 (水平圆弧)
        function updatePrecession(phiDeg) {
            if (precessionArc) scene.remove(precessionArc);
            const phiRad = phiDeg * Math.PI / 180;
            const radius = 1.6;
            const vertices = [];
            // 始终绘制从0到phiDeg的圆弧
            for (let i = 0; i <= 64; i++) {
                const angle = phiRad * (i / 64);
                vertices.push(new THREE.Vector3(radius * Math.cos(angle), radius * Math.sin(angle), 0.15));
            }
            const geo = new THREE.BufferGeometry().setFromPoints(vertices);
            precessionArc = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xffaa66 }));
            scene.add(precessionArc);
            // 标签放在圆弧末端
            if (phiDeg !== 0) {
                phiLabel.position.set(radius * Math.cos(phiRad), radius * Math.sin(phiRad), 0.35);
            } else {
                phiLabel.position.set(radius, 0, 0.35);
            }
            phiDiv.textContent = `φ = ${phiDeg}°`;
        }
        
        // 更新章动角 (ζ轴到本体z轴的圆弧)
        function updateNutation(thetaDeg, bodyQuat) {
            if (nutationArc) scene.remove(nutationArc);
            const thetaRad = thetaDeg * Math.PI / 180;
            const bodyZDir = new THREE.Vector3(0, 0, 1).applyQuaternion(bodyQuat).normalize();
            const spaceZDir = new THREE.Vector3(0, 0, 1);
            
            if (thetaDeg === 0 || thetaDeg === 180) {
                thetaLabel.position.set(0.8, 0.8, 1.2);
                thetaDiv.textContent = `θ = ${thetaDeg}°`;
                return;
            }
            
            const radius = 1.5;
            const vertices = [];
            // 绘制从空间Z轴到本体Z轴的圆弧
            for (let i = 0; i <= 64; i++) {
                const angle = thetaRad * (i / 64);
                const vec = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
                const quatToZ = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), spaceZDir);
                vertices.push(vec.clone().applyQuaternion(quatToZ).multiplyScalar(radius));
            }
            const geo = new THREE.BufferGeometry().setFromPoints(vertices);
            nutationArc = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x66ffaa }));
            scene.add(nutationArc);
            
            // 标签放在圆弧中间位置
            const midAngle = thetaRad / 2;
            const midVec = new THREE.Vector3(Math.sin(midAngle), 0, Math.cos(midAngle));
            const quatToZ = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), spaceZDir);
            thetaLabel.position.copy(midVec.clone().applyQuaternion(quatToZ).multiplyScalar(radius + 0.35));
            thetaDiv.textContent = `θ = ${thetaDeg}°`;
        }
        
        // 更新自转角: 节线到本体x轴
        function updateSpin(psiDeg, bodyQuat) {
            if (spinArc) scene.remove(spinArc);
            if (nodalLine) scene.remove(nodalLine);
            
            const bodyZDir = new THREE.Vector3(0, 0, 1).applyQuaternion(bodyQuat).normalize();
            const spaceZDir = new THREE.Vector3(0, 0, 1);
            let nodalDir = new THREE.Vector3().crossVectors(spaceZDir, bodyZDir).normalize();
            if (Math.abs(bodyZDir.dot(spaceZDir)) > 0.9999) {
                nodalDir = new THREE.Vector3(1, 0, 0);
            }
            
            // 绘制白色节线
            const nodalLen = 2.2;
            const nodalPoints = [new THREE.Vector3(0, 0, 0), nodalDir.clone().multiplyScalar(nodalLen)];
            const nodalGeo = new THREE.BufferGeometry().setFromPoints(nodalPoints);
            nodalLine = new THREE.Line(nodalGeo, new THREE.LineBasicMaterial({ color: 0xffffff }));
            scene.add(nodalLine);
            
            // 计算自转角（节线到本体x轴的实际角度）
            const bodyXDir = new THREE.Vector3(1, 0, 0).applyQuaternion(bodyQuat).normalize();
            const nodalInXY = nodalDir.clone().sub(bodyZDir.clone().multiplyScalar(nodalDir.dot(bodyZDir))).normalize();
            const xInPlane = bodyXDir.clone();
            let actualAngle = Math.atan2(
                xInPlane.dot(new THREE.Vector3().crossVectors(nodalInXY, bodyZDir)),
                xInPlane.dot(nodalInXY)
            );
            if (actualAngle < 0) actualAngle += 2 * Math.PI;
            const actualAngleDeg = (actualAngle * 180 / Math.PI).toFixed(1);
            
            // 显示滑块设定的角度值（这样与用户输入一致）
            psiDiv.textContent = `ψ = ${psiDeg}°`;
            
            // 绘制紫色圆弧（根据滑块角度绘制）
            const psiRad = psiDeg * Math.PI / 180;
            if (psiDeg !== 0) {
                const radius = 1.3;
                const vertices = [];
                for (let i = 0; i <= 64; i++) {
                    const t = i / 64;
                    const angle = psiRad * t;
                    const localPoint = new THREE.Vector3(Math.cos(angle), Math.sin(angle), 0);
                    const yAxis = new THREE.Vector3().crossVectors(bodyZDir, nodalInXY).normalize();
                    const point = nodalInXY.clone().multiplyScalar(localPoint.x * radius)
                        .add(yAxis.clone().multiplyScalar(localPoint.y * radius));
                    vertices.push(point);
                }
                const geo = new THREE.BufferGeometry().setFromPoints(vertices);
                spinArc = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xaa66ff }));
                scene.add(spinArc);
            }
            
            // 标签放在本体x轴末端
            const xTip = bodyXDir.clone().multiplyScalar(2.2);
            psiLabel.position.copy(xTip);
        }
        
        // ========== 稳定照明系统 ==========
        const ambientLight = new THREE.AmbientLight(0x404060, 0.7);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
        mainLight.position.set(3, 5, 2);
        scene.add(mainLight);
        const fillLight1 = new THREE.PointLight(0x6688aa, 0.4);
        fillLight1.position.set(-2, 2, 3);
        scene.add(fillLight1);
        const fillLight2 = new THREE.PointLight(0xaa8866, 0.35);
        fillLight2.position.set(2, 1, -2);
        scene.add(fillLight2);
        const backLight = new THREE.PointLight(0x88aaff, 0.3);
        backLight.position.set(0, 1.5, -2.5);
        scene.add(backLight);
        const bottomLight = new THREE.PointLight(0x446688, 0.25);
        bottomLight.position.set(0, -2, 0);
        scene.add(bottomLight);
        
        // 星空背景
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 1800;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            starsPositions[i*3] = (Math.random() - 0.5) * 220;
            starsPositions[i*3+1] = (Math.random() - 0.5) * 120;
            starsPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, transparent: true, opacity: 0.6 });
        const starsField = new THREE.Points(starsGeo, starsMaterial);
        scene.add(starsField);
        
        function rotateStars() {
            starsField.rotation.y += 0.0003;
            starsField.rotation.x += 0.00015;
            requestAnimationFrame(rotateStars);
        }
        rotateStars();
        
        // ========== 欧拉角控制 ==========
        const phiSlider = document.getElementById('phi');
        const thetaSlider = document.getElementById('theta');
        const psiSlider = document.getElementById('psi');
        const phiVal = document.getElementById('phiVal');
        const thetaVal = document.getElementById('thetaVal');
        const psiVal = document.getElementById('psiVal');
        
        function updateRotation() {
            const phiDeg = parseFloat(phiSlider.value);
            const thetaDeg = parseFloat(thetaSlider.value);
            const psiDeg = parseFloat(psiSlider.value);
            
            // 更新显示数值
            phiVal.innerText = phiDeg + '°';
            thetaVal.innerText = thetaDeg + '°';
            psiVal.innerText = psiDeg + '°';
            
            const phiRad = phiDeg * Math.PI / 180;
            const thetaRad = thetaDeg * Math.PI / 180;
            const psiRad = psiDeg * Math.PI / 180;
            
            // ZXZ 欧拉角旋转: 绕Z轴(ζ) -> 绕新X轴 -> 绕新Z轴(本体z)
            // 第一步: 绕世界Z轴旋转 phi
            const qPhi = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), phiRad);
            // 第二步: 绕经过qPhi旋转后的X轴(节线)旋转 theta
            const xAfterPhi = new THREE.Vector3(1, 0, 0).applyQuaternion(qPhi);
            const qTheta = new THREE.Quaternion().setFromAxisAngle(xAfterPhi, thetaRad);
            // 第三步: 绕经过前两次旋转后的Z轴(本体z)旋转 psi
            const combined = qTheta.clone().multiply(qPhi);
            const zAfterCombined = new THREE.Vector3(0, 0, 1).applyQuaternion(combined);
            const qPsi = new THREE.Quaternion().setFromAxisAngle(zAfterCombined, psiRad);
            // 最终四元数: 先应用 qPhi, 再 qTheta, 再 qPsi
            const finalQuat = qPsi.clone().multiply(qTheta).multiply(qPhi);
            bodyGroup.quaternion.copy(finalQuat);
            
            // 更新所有可视化元素
            updatePrecession(phiDeg);
            updateNutation(thetaDeg, finalQuat);
            updateSpin(psiDeg, finalQuat);
        }
        
        phiSlider.addEventListener('input', updateRotation);
        thetaSlider.addEventListener('input', updateRotation);
        psiSlider.addEventListener('input', updateRotation);
        
        // 初始化
        updateRotation();
        
        document.getElementById('resetViewBtn').addEventListener('click', () => {
            camera.position.set(5.5, 4.5, 5.5);
            controls.target.set(0, 0, 0);
            controls.update();
        });
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('角度精确同步 | 滑块数值与图像转动角度完全一致 | ζ轴竖直向上');
    </script>
</body>
</html>
